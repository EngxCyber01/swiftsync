        <style>
            /* ========================================
               PERFORMANCE OPTIMIZATIONS
               ======================================== */
            
            /* Splash Screen for PWA - Optimized for instant display */
            #splash-screen {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100vh;
                background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                z-index: 99999;
                opacity: 1;
                transition: opacity 0.3s ease;
            }
            
            #splash-screen.hidden {
                display: none;
            }
            
            .splash-logo {
                width: 120px;
                height: 120px;
                border-radius: 30px;
                animation: pulse 1.2s ease-in-out infinite;
                box-shadow: 0 8px 32px rgba(0, 217, 255, 0.3);
                will-change: transform;
                image-rendering: -webkit-optimize-contrast;
                image-rendering: crisp-edges;
            }
            
            .splash-text {
                color: #00d9ff;
                font-size: 2rem;
                font-weight: 800;
                margin-top: 1.5rem;
                animation: fadeInUp 0.8s ease;
            }
            
            .splash-subtitle {
                color: rgba(255, 255, 255, 0.7);
                font-size: 0.9rem;
                margin-top: 0.5rem;
                animation: fadeInUp 0.8s ease 0.2s both;
            }
            
            /* Hide text cursor globally */
            * {
                caret-color: transparent !important;
            }
            
            input, textarea {
                caret-color: transparent !important;
            }
            
            /* Hide text cursor globally */
            * {
                caret-color: transparent !important;
            }
            
            input, textarea {
                caret-color: transparent !important;
            }
            
            @keyframes pulse {
                0%, 100% { transform: scale(1); }
                50% { transform: scale(1.05); }
            }
            
            @keyframes fadeInUp {
                from {
                    opacity: 0;
                    transform: translateY(20px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }
            
            @keyframes fadeOut {
                to {
                    opacity: 0;
                    visibility: hidden;
                }
            }
            
            * { 
                margin: 0; 
                padding: 0; 
                box-sizing: border-box;
            }
            
            /* ULTRA-RESPONSIVE: Remove ALL delays and enable instant feedback */
            *, *:focus, *:active {
                outline: none !important;
                -webkit-tap-highlight-color: transparent;  /* No iOS tap delay */
                -webkit-touch-callout: none;  /* Disable iOS callout */
            }
            
            /* GPU acceleration for smooth animations */
            button, .sync-btn, .download-btn, .subject-header, .file-item {
                -webkit-transform: translateZ(0);  /* Force GPU rendering */
                transform: translateZ(0);
                backface-visibility: hidden;  /* Smoother animations */
                will-change: transform, opacity;  /* Optimize for changes */
            }
            
            /* Remove focus ring from buttons for instant feel */
            button:focus, button:active,
            .download-btn:focus, .download-btn:active,
            .sync-btn:focus, .sync-btn:active,
            .subject-header:focus, .subject-header:active,
            .file-item:focus, .file-item:active {
                outline: none !important;
                box-shadow: none !important;
            }
            
            /* Make ALL buttons ultra-responsive */
            button, .btn, .sync-btn, .download-btn {
                cursor: pointer;
                touch-action: manipulation;  /* Prevent zoom delay on mobile */
                user-select: none;
                -webkit-user-select: none;
                transition: all 0.1s ease-out !important;  /* INSTANT response */
            }
            
            button:active, .btn:active, .sync-btn:active, .download-btn:active {
                transform: scale(0.97) !important;  /* INSTANT visual feedback */
                transition: transform 0.05s ease-out !important;
            }
            
            :root {
                --bg-primary: #0a0a0a;
                --bg-secondary: #111111;
                --bg-tertiary: #1a1a1a;
                --text-primary: #ffffff;
                --text-secondary: #a0a0a0;
                --text-tertiary: #666666;
                --accent: #00d9ff;
                --accent-glow: rgba(0, 217, 255, 0.3);
                --success: #00ff88;
                --border: rgba(255, 255, 255, 0.1);
                --glass: rgba(255, 255, 255, 0.05);
                --kurdish-red: #DC143C;
                --kurdish-green: #228B22;
                --kurdish-yellow: #FFD700;
            }
            
            body { 
                font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
                background: var(--bg-primary);
                color: var(--text-primary);
                min-height: 100vh;
                padding: 0;
                margin: 0;
                overflow-x: hidden;
                cursor: default;
            }
            
            /* Hide text cursor but allow selection */
            * {
                caret-color: transparent;
            }
            
            /* Smooth scrolling globally */
            html {
                scroll-behavior: smooth;
            }
            
            body {
                -webkit-font-smoothing: antialiased;
                -moz-osx-font-smoothing: grayscale;
            }
            
            /* Allow text selection for copying */
            ::selection {
                background: var(--accent);
                color: var(--bg-primary);
            }
            
            ::-moz-selection {
                background: var(--accent);
                color: var(--bg-primary);
            }
            
            /* Animated Background */
            body::before {
                content: '';
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: 
                    radial-gradient(circle at 20% 50%, rgba(0, 217, 255, 0.15) 0%, transparent 50%),
                    radial-gradient(circle at 80% 80%, rgba(0, 255, 136, 0.1) 0%, transparent 50%),
                    radial-gradient(circle at 40% 20%, rgba(138, 43, 226, 0.1) 0%, transparent 50%);
                pointer-events: none;
                animation: bgShift 20s ease infinite;
            }
            
            @keyframes bgShift {
                0%, 100% { opacity: 1; }
                50% { opacity: 0.8; }
            }
            
            .container {
                max-width: 1400px;
                margin: 0 auto;
                padding: 2rem 1.5rem;
                position: relative;
                z-index: 1;
            }
            
            /* Header */
            .nav {
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 1.5rem 0;
                margin-bottom: 3rem;
                background: rgba(22, 33, 62, 0.6);
                backdrop-filter: blur(5px);
                border-radius: 15px;
                padding: 1.5rem 2rem;
                border: 1px solid rgba(255, 215, 0, 0.15);
            }
            
            .logo {
                display: flex;
                align-items: center;
                gap: 1rem;
            }
            
            .logo-icon {
                width: 60px;
                height: 60px;
                border-radius: 18px;
                display: flex;
                align-items: center;
                justify-content: center;
                box-shadow: 0 8px 32px rgba(220, 20, 60, 0.4), 0 0 40px rgba(255, 215, 0, 0.3), 0 4px 16px rgba(0, 0, 0, 0.3);
                animation: flagGlow 4s ease-in-out infinite;
                overflow: hidden;
                position: relative;
                background: linear-gradient(135deg, rgba(10, 10, 10, 0.8), rgba(20, 20, 20, 0.9));
            }
            
            @keyframes flagGlow {
                0%, 100% { 
                    box-shadow: 0 8px 32px rgba(220, 20, 60, 0.4), 0 0 40px rgba(255, 215, 0, 0.3), 0 4px 16px rgba(0, 0, 0, 0.3);
                    transform: translateY(0);
                }
                50% { 
                    box-shadow: 0 12px 48px rgba(220, 20, 60, 0.6), 0 0 60px rgba(255, 215, 0, 0.5), 0 8px 24px rgba(0, 0, 0, 0.4);
                    transform: translateY(-2px);
                }
            }
            
            .logo-icon::before {
                content: '';
                position: absolute;
                top: 0;
                left: -10%;
                width: 120%;
                height: 33%;
                background: linear-gradient(180deg, 
                    #E63946 0%, 
                    #DC143C 20%, 
                    #C41230 60%, 
                    #B71C1C 100%);
                box-shadow: inset 0 -3px 10px rgba(0, 0, 0, 0.3), 0 2px 8px rgba(220, 20, 60, 0.4);
                animation: waveTop 3s ease-in-out infinite;
                transform-origin: center;
            }
            
            @keyframes waveTop {
                0%, 100% { 
                    transform: skewY(0deg) translateX(0);
                    border-radius: 0 0 50% 50% / 0 0 20% 20%;
                }
                50% { 
                    transform: skewY(-1deg) translateX(2px);
                    border-radius: 0 0 45% 55% / 0 0 18% 22%;
                }
            }
            
            .logo-icon::after {
                content: '';
                position: absolute;
                bottom: 0;
                left: -10%;
                width: 120%;
                height: 33%;
                background: linear-gradient(180deg, 
                    #1B7A1B 0%, 
                    #2E7D32 30%, 
                    #228B22 70%, 
                    #0F5F0F 100%);
                box-shadow: inset 0 3px 10px rgba(0, 0, 0, 0.3), 0 -2px 8px rgba(34, 139, 34, 0.4);
                animation: waveBottom 3s ease-in-out infinite;
                animation-delay: 0.2s;
                transform-origin: center;
            }
            
            @keyframes waveBottom {
                0%, 100% { 
                    transform: skewY(0deg) translateX(0);
                    border-radius: 50% 50% 0 0 / 20% 20% 0 0;
                }
                50% { 
                    transform: skewY(1deg) translateX(-2px);
                    border-radius: 55% 45% 0 0 / 22% 18% 0 0;
                }
            }
            
            .logo-icon .flag-center {
                position: absolute;
                top: 33%;
                left: -5%;
                width: 110%;
                height: 34%;
                background: linear-gradient(135deg, 
                    #FFFFFF 0%, 
                    #FAFAFA 30%, 
                    #F8F8F8 60%, 
                    #F0F0F0 100%);
                display: flex;
                align-items: center;
                justify-content: center;
                box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.1), inset 0 -2px 8px rgba(0, 0, 0, 0.1);
                animation: waveMid 2.5s ease-in-out infinite;
                z-index: 2;
            }
            
            @keyframes waveMid {
                0%, 100% { transform: scaleY(1) translateY(0); }
                50% { transform: scaleY(1.05) translateY(-0.5px); }
            }
            
            .logo-icon .sun {
                width: 14px;
                height: 14px;
                background: radial-gradient(circle at 30% 30%, 
                    #FFFACD 0%, 
                    #FFD700 30%, 
                    #FFA500 60%, 
                    #FF8C00 100%);
                border-radius: 50%;
                position: absolute;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                animation: sunPulse 3s ease-in-out infinite;
                box-shadow: 
                    0 0 8px rgba(255, 215, 0, 1),
                    0 0 16px rgba(255, 165, 0, 0.8),
                    0 0 24px rgba(255, 140, 0, 0.6),
                    inset -3px -3px 6px rgba(255, 140, 0, 0.4),
                    inset 2px 2px 4px rgba(255, 250, 205, 0.6);
                z-index: 10;
            }
            
            @keyframes sunPulse {
                0%, 100% { 
                    transform: translate(-50%, -50%) scale(1) rotate(0deg);
                    box-shadow: 
                        0 0 15px rgba(255, 215, 0, 1),
                        0 0 30px rgba(255, 165, 0, 0.8),
                        0 0 45px rgba(255, 140, 0, 0.6);
                }
                50% { 
                    transform: translate(-50%, -50%) scale(1.12) rotate(45deg);
                    box-shadow: 
                        0 0 20px rgba(255, 215, 0, 1),
                        0 0 40px rgba(255, 165, 0, 1),
                        0 0 60px rgba(255, 140, 0, 0.8),
                        0 0 80px rgba(255, 140, 0, 0.4);
                }
            }
            
            .logo-icon .sun::before {
                content: '';
                position: absolute;
                top: 50%;
                left: 50%;
                width: 35px;
                height: 35px;
                transform: translate(-50%, -50%);
                background: 
                    repeating-conic-gradient(
                        from 0deg,
                        transparent 0deg 8deg,
                        rgba(255, 215, 0, 0.35) 8deg 16deg
                    );
                border-radius: 50%;
                animation: sunRays 8s linear infinite;
                z-index: -1;
            }
            
            @keyframes sunRays {
                0% { transform: translate(-50%, -50%) rotate(0deg) scale(1); opacity: 0.5; }
                50% { transform: translate(-50%, -50%) rotate(180deg) scale(1.08); opacity: 0.8; }
                100% { transform: translate(-50%, -50%) rotate(360deg) scale(1); opacity: 0.5; }
            }
            
            .logo-icon .sun::after {
                content: '';
                position: absolute;
                top: 50%;
                left: 50%;
                width: 30px;
                height: 30px;
                transform: translate(-50%, -50%);
                background: radial-gradient(circle, rgba(255, 255, 255, 0.6) 0%, transparent 70%);
                border-radius: 50%;
                animation: sunGlare 4s ease-in-out infinite;
            }
            
            @keyframes sunGlare {
                0%, 100% { opacity: 0.4; transform: translate(-50%, -50%) scale(0.8); }
                50% { opacity: 0.8; transform: translate(-50%, -50%) scale(1.1); }
            }
            
            .logo-text h1 {
                font-size: 1.5rem;
                font-weight: 900;
                background: linear-gradient(135deg, #DC143C 0%, #06b6d4 50%, #228B22 100%);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                background-clip: text;
                letter-spacing: -0.02em;
                animation: shimmer 3s ease-in-out infinite;
            }
            
            @keyframes shimmer {
                0%, 100% { filter: brightness(1); }
                50% { filter: brightness(1.3); }
            }
            
            .logo-text p {
                font-size: 0.75rem;
                background: linear-gradient(90deg, #DC143C 0%, #06b6d4 50%, #228B22 100%);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                background-clip: text;
                text-transform: uppercase;
                letter-spacing: 0.1em;
                font-weight: 600;
            }
            
            .year-badge {
                padding: 0.5rem 1rem;
                background: rgba(0, 217, 255, 0.15);
                border: 1px solid rgba(0, 217, 255, 0.3);
                border-radius: 8px;
                font-size: 0.875rem;
                font-weight: 600;
                color: #00d9ff;
                backdrop-filter: blur(10px);
                white-space: nowrap;
                transition: all 0.2s ease;
            }
            
            .year-badge:hover {
                background: rgba(0, 217, 255, 0.25);
                border-color: rgba(0, 217, 255, 0.5);
                transform: translateY(-1px);
            }
            
            /* PWA Install Button */
            .install-btn {
                display: none;
                align-items: center;
                justify-content: center;
                padding: 0.6rem 1.2rem;
                background: linear-gradient(135deg, rgba(0, 217, 255, 0.15), rgba(0, 150, 255, 0.15));
                color: #00d9ff;
                border: 2px solid rgba(0, 217, 255, 0.4);
                border-radius: 10px;
                font-size: 0.9rem;
                font-weight: 600;
                cursor: pointer;
                transition: all 0.2s ease;
                white-space: nowrap;
                -webkit-tap-highlight-color: transparent;
                user-select: none;
                position: relative;
                overflow: hidden;
            }
            
            .install-btn::before {
                content: '';
                position: absolute;
                top: 50%;
                left: 50%;
                width: 0;
                height: 0;
                background: rgba(0, 217, 255, 0.3);
                border-radius: 50%;
                transform: translate(-50%, -50%);
                transition: width 0.4s ease, height 0.4s ease;
            }
            
            .install-btn:hover::before,
            .install-btn:active::before {
                width: 300px;
                height: 300px;
            }
            
            .install-btn:hover {
                background: linear-gradient(135deg, rgba(0, 217, 255, 0.3), rgba(0, 150, 255, 0.3));
                border-color: rgba(0, 217, 255, 0.6);
                transform: translateY(-2px) scale(1.02);
                box-shadow: 0 5px 20px rgba(0, 217, 255, 0.3);
            }
            
            .install-btn:active {
                transform: translateY(0) scale(0.98);
            }
            
            .install-btn.pulse {
                animation: pulse-install 2s ease-in-out infinite;
            }
            
            @keyframes pulse-install {
                0%, 100% {
                    box-shadow: 0 0 0 0 rgba(0, 217, 255, 0.7);
                }
                50% {
                    box-shadow: 0 0 0 10px rgba(0, 217, 255, 0);
                }
            }
            
            .install-btn i {
                margin-right: 0.5rem;
                position: relative;
                z-index: 1;
            }
            
            .install-btn span {
                position: relative;
                z-index: 1;
            }
            
            .install-btn:disabled {
                opacity: 0.6;
                cursor: not-allowed;
                transform: none;
            }
            
            .nav-actions {
                display: flex;
                gap: 0.75rem;
                align-items: center;
            }
            
            /* Kurdish Text Animation (in navbar) - Fixed size to prevent layout shift */
            .kurdish-text {
                font-size: 1.1rem;
                font-weight: 500;
                color: rgba(255, 255, 255, 0.95);
                letter-spacing: 0.03em;
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                background: linear-gradient(135deg, #DC143C 0%, #06b6d4 50%, #228B22 100%);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                background-clip: text;
                width: 380px;
                height: 32px;
                min-height: 32px;
                text-align: center;
                display: flex;
                align-items: center;
                justify-content: center;
                white-space: nowrap;
                overflow: hidden;
            }
            
            @keyframes cursorBlink {
                0%, 49% { opacity: 1; }
                50%, 100% { opacity: 0; }
            }
            
            .kurdish-text::after {
                content: '|';
                color: #06b6d4;
                animation: cursorBlink 0.7s infinite;
                margin-left: 2px;
            }
            
            /* Stats Grid */
            .stats {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
                gap: 1.5rem;
                margin-bottom: 3rem;
            }
            
            .stat-card {
                background: var(--bg-secondary);
                border: 1px solid var(--border);
                border-radius: 20px;
                padding: 2rem;
                position: relative;
                overflow: hidden;
                transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            }
            
            .stat-card::before {
                content: '';
                position: absolute;
                top: 0;
                left: 0;
                right: 0;
                height: 2px;
                background: linear-gradient(90deg, var(--accent), var(--success));
            }
            
            .stat-card:hover {
                transform: translateY(-5px);
                border-color: var(--accent);
                box-shadow: 0 20px 60px rgba(0, 217, 255, 0.2);
            }
            
            .stat-header {
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 1.5rem;
            }
            
            .stat-icon {
                width: 45px;
                height: 45px;
                background: var(--glass);
                border-radius: 12px;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 1.3rem;
            }
            
            .stat-card:nth-child(1) .stat-icon { color: var(--accent); }
            .stat-card:nth-child(2) .stat-icon { color: var(--success); }
            .stat-card:nth-child(3) .stat-icon { color: #ff0080; }
            
            .stat-trend {
                font-size: 0.75rem;
                color: var(--success);
                background: rgba(0, 255, 136, 0.1);
                padding: 0.25rem 0.5rem;
                border-radius: 6px;
            }
            
            .stat-value {
                font-size: 2.5rem;
                font-weight: 900;
                background: linear-gradient(135deg, var(--text-primary), var(--text-secondary));
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                background-clip: text;
                line-height: 1;
                margin-bottom: 0.5rem;
            }
            
            .stat-label {
                font-size: 0.85rem;
                color: var(--text-tertiary);
                text-transform: uppercase;
                letter-spacing: 0.05em;
                font-weight: 600;
            }
            
            /* Toolbar */
            .toolbar {
                background: var(--bg-secondary);
                border: 1px solid var(--border);
                border-radius: 20px;
                padding: 1.5rem;
                margin-bottom: 2rem;
                display: flex;
                gap: 1rem;
                align-items: center;
                flex-wrap: wrap;
            }
            
            .search-box {
                flex: 1;
                min-width: 300px;
                position: relative;
            }
            
            .search-box input {
                width: 100%;
                padding: 1rem 1rem 1rem 3rem;
                background: var(--bg-tertiary);
                border: 1px solid var(--border);
                border-radius: 12px;
                color: var(--text-primary);
                font-size: 0.95rem;
                font-weight: 500;
                transition: all 0.3s;
                caret-color: var(--accent);
                cursor: text;
                overflow: hidden;
                text-overflow: ellipsis;
            }
            
            .search-box input:focus {
                outline: none;
                border-color: var(--accent);
                background: var(--bg-primary);
                box-shadow: 0 0 0 4px rgba(0, 217, 255, 0.1);
            }
            
            .search-box input::placeholder {
                color: var(--text-tertiary);
            }
            
            .search-box i {
                position: absolute;
                left: 1rem;
                top: 50%;
                transform: translateY(-50%);
                color: var(--text-tertiary);
                font-size: 1.1rem;
            }
            
            .sync-btn {
                padding: 1rem 2rem;
                background: linear-gradient(135deg, var(--accent), var(--success));
                color: var(--bg-primary);
                border: none;
                border-radius: 12px;
                cursor: pointer;
                font-weight: 700;
                font-size: 0.9rem;
                transition: all 0.1s ease-out;  /* ULTRA FAST response */
                display: flex;
                align-items: center;
                gap: 0.75rem;
                position: relative;
                overflow: hidden;
                user-select: none;
                -webkit-tap-highlight-color: transparent;  /* Remove mobile tap delay */
                touch-action: manipulation;  /* Prevent zoom on double-tap */
                will-change: transform, box-shadow;  /* GPU acceleration */
            }
            
            .sync-btn::before {
                content: '';
                position: absolute;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                width: 0;
                height: 0;
                border-radius: 50%;
                background: rgba(255, 255, 255, 0.3);
                transition: width 0.3s ease-out, height 0.3s ease-out;  /* Faster ripple */
            }
            
            .sync-btn:hover::before {
                width: 300px;
                height: 300px;
            }
            
            .sync-btn:hover {
                transform: translateY(-2px) scale(1.02);  /* More noticeable feedback */
                box-shadow: 0 10px 40px var(--accent-glow);
            }
            
            .sync-btn:active {
                transform: translateY(0) scale(0.98);  /* INSTANT press feedback */
                transition: all 0.05s ease-out;  /* INSTANT response on click */
            }
            
            .sync-btn:disabled {
                opacity: 0.5;
                cursor: not-allowed;
                transform: none !important;
            }
            
            .info-badge {
                display: flex;
                align-items: center;
                gap: 0.5rem;
                padding: 0.75rem 1.25rem;
                background: var(--glass);
                border: 1px solid var(--border);
                border-radius: 50px;
                font-size: 0.85rem;
                color: var(--text-secondary);
                backdrop-filter: blur(10px);
            }
            
            .info-badge i {
                color: var(--accent);
            }
            
            /* Subject Sections - Clean Design */
            .subject-section {
                background: var(--bg-secondary);
                border: 1px solid var(--border);
                border-radius: 20px;
                margin-bottom: 1.5rem;
                overflow: hidden;
                transition: all 0.3s ease;
                position: relative;
            }
            
            .subject-section:hover {
                border-color: var(--accent);
                transform: translateY(-2px);
                box-shadow: 0 8px 24px rgba(0, 217, 255, 0.15);
            }
            
            .subject-header {
                padding: 1.5rem 2rem;
                background: var(--bg-tertiary);
                cursor: pointer;
                display: flex;
                justify-content: space-between;
                align-items: center;
                transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
                user-select: none;
                -webkit-tap-highlight-color: transparent;
                will-change: background, transform;
            }
            
            .subject-header:hover {
                background: rgba(0, 217, 255, 0.05);
                transform: translateX(2px);
            }
            
            .subject-header:active {
                transform: translateX(1px) scale(0.99);
            }
            
            .subject-header:focus, .subject-header:active {
                outline: none !important;
                border: none !important;
            }
            
            .subject-title {
                display: flex;
                align-items: center;
                gap: 1rem;
                font-size: 1.1rem;
                font-weight: 700;
                color: var(--text-primary);
            }
            
            .subject-title i {
                font-size: 1.3rem;
                color: var(--accent);
            }
            
            .file-count {
                font-size: 0.8rem;
                color: var(--text-tertiary);
                background: var(--glass);
                padding: 0.35rem 0.85rem;
                border-radius: 50px;
                margin-left: 0.75rem;
            }
            
            .collapse-btn {
                width: 40px;
                height: 40px;
                background: var(--glass);
                border: 1px solid var(--border);
                border-radius: 10px;
                color: var(--accent);
                cursor: pointer;
                display: flex;
                align-items: center;
                justify-content: center;
                transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
                will-change: transform, background;
            }
            
            .collapse-btn:hover {
                background: var(--bg-tertiary);
                transform: scale(1.1);
                border-color: var(--accent);
            }
            
            .collapse-btn:active {
                transform: scale(0.95);
            }
            
            .collapse-btn i {
                transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
                transform: rotate(-90deg);
                will-change: transform;
            }
            
            /* Smooth content transitions */
            .subject-files,
            .semester-results-content,
            .semester-results-table,
            .year-content {
                transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
                overflow: hidden;
            }
            
            .subject-files {
                padding: 1.5rem;
                display: none;
            }
            
            /* File Items - Clean Design */
            .file-item {
                display: flex;
                align-items: center;
                gap: 1.5rem;
                padding: 1.5rem;
                background: var(--bg-tertiary);
                border: 1px solid var(--border);
                border-radius: 16px;
                margin-bottom: 1rem;
                transition: all 0.2s ease;
                position: relative;
            }
            
            .file-item:last-child {
                margin-bottom: 0;
            }
            
            .file-item:hover {
                background: var(--bg-secondary);
                border-color: var(--accent);
                transform: translateX(4px);
                box-shadow: 0 4px 16px rgba(0, 217, 255, 0.15);
            }
            
            .file-icon {
                width: 55px;
                height: 55px;
                display: flex;
                align-items: center;
                justify-content: center;
                border-radius: 12px;
                font-size: 1.5rem;
                flex-shrink: 0;
            }
            
            .file-icon.pdf { 
                background: linear-gradient(135deg, rgba(239, 68, 68, 0.2), rgba(220, 38, 38, 0.1));
                color: #ef4444;
            }
            .file-icon.doc { 
                background: linear-gradient(135deg, rgba(59, 130, 246, 0.2), rgba(37, 99, 235, 0.1));
                color: #3b82f6;
            }
            .file-icon.ppt { 
                background: linear-gradient(135deg, rgba(249, 115, 22, 0.2), rgba(234, 88, 12, 0.1));
                color: #f97316;
            }
            .file-icon.default { 
                background: var(--glass);
                color: var(--text-secondary);
            }
            
            .file-info {
                flex: 1;
                min-width: 0;
            }
            
            .file-name {
                font-weight: 600;
                color: var(--text-primary);
                margin-bottom: 0.5rem;
                font-size: 0.95rem;
                line-height: 1.4;
                user-select: text;
                cursor: text;
            }
            
            .file-meta {
                color: var(--text-tertiary);
                font-size: 0.8rem;
                display: flex;
                align-items: center;
                gap: 1rem;
            }
            
            .file-size {
                padding: 0.5rem 1rem;
                background: var(--glass);
                border: 1px solid var(--border);
                border-radius: 8px;
                font-size: 0.85rem;
                font-weight: 600;
                color: var(--text-secondary);
                white-space: nowrap;
            }
            
            .open-btn {
                padding: 0.75rem 1.5rem;
                background: linear-gradient(135deg, #8b5cf6, #6366f1);
                color: white;
                border: none;
                border-radius: 10px;
                cursor: pointer !important;
                font-weight: 700;
                font-size: 0.85rem;
                transition: all 0.15s ease-out;
                text-decoration: none !important;
                display: inline-flex;
                align-items: center;
                justify-content: center;
                gap: 0.5rem;
                user-select: none;
                white-space: nowrap;
                touch-action: manipulation;
                -webkit-tap-highlight-color: transparent;
            }
            
            .open-btn:hover {
                transform: translateY(-2px);
                box-shadow: 0 8px 20px rgba(139, 92, 246, 0.4);
            }
            
            .open-btn:active {
                transform: translateY(0) scale(0.98);
                transition: all 0.05s ease-out;
            }
            
            .download-btn {
                padding: 0.75rem 1.5rem;
                background: linear-gradient(135deg, var(--accent), var(--success));
                color: var(--bg-primary);
                border: none;
                border-radius: 10px;
                cursor: pointer !important;
                font-weight: 700;
                font-size: 0.85rem;
                transition: all 0.15s ease-out;
                text-decoration: none !important;
                display: inline-flex;
                align-items: center;
                gap: 0.5rem;
                user-select: none;
                white-space: nowrap;
                touch-action: manipulation;
                -webkit-tap-highlight-color: transparent;
            }
            
            .download-btn:hover {
                transform: translateY(-2px);
                box-shadow: 0 8px 20px var(--accent-glow);
            }
            
            .download-btn:active {
                transform: translateY(0) scale(0.98);
                transition: all 0.05s ease-out;
            }
            
            /* AI Summary Button */
            .summary-btn {
                padding: 0.75rem 1.5rem;
                background: linear-gradient(135deg, #DC143C 0%, #ff6b6b 100%);
                color: white;
                border: none;
                border-radius: 10px;
                cursor: pointer !important;
                font-weight: 700;
                font-size: 0.85rem;
                transition: all 0.15s ease-out;
                display: inline-flex;
                align-items: center;
                gap: 0.5rem;
                user-select: none;
                white-space: nowrap;
                box-shadow: 0 4px 12px rgba(220, 20, 60, 0.3);
                touch-action: manipulation;
                -webkit-tap-highlight-color: transparent;
            }
            
            .summary-btn:hover {
                transform: translateY(-2px);
                box-shadow: 0 8px 20px rgba(220, 20, 60, 0.5);
                background: linear-gradient(135deg, #ff1744 0%, #ff4757 100%);
            }
            
            .summary-btn:active {
                transform: translateY(0) scale(0.98);
                transition: all 0.05s ease-out;
            }
            
            .summary-btn:disabled {
                opacity: 0.6;
                cursor: not-allowed;
                transform: none !important;
            }
            
            /* Summarize All Button */
            .summarize-all-btn {
                padding: 1rem 2rem;
                background: linear-gradient(135deg, #FFD700 0%, #2ea043 100%);
                color: #0f172a;
                border: none;
                border-radius: 12px;
                cursor: pointer !important;
                font-weight: 700;
                font-size: 0.9rem;
                transition: all 0.15s ease-out;
                display: flex;
                align-items: center;
                gap: 0.75rem;
                margin: 1.5rem 1.5rem 0 1.5rem;
                user-select: none;
                width: calc(100% - 3rem);
                justify-content: center;
                box-shadow: 0 4px 12px rgba(255, 215, 0, 0.3);
                touch-action: manipulation;
                -webkit-tap-highlight-color: transparent;
            }
            
            .summarize-all-btn:hover {
                transform: translateY(-2px);
                box-shadow: 0 8px 25px rgba(255, 215, 0, 0.5);
                background: linear-gradient(135deg, #FFE55C 0%, #3cb043 100%);
            }
            
            .summarize-all-btn:active {
                transform: translateY(0) scale(0.98);
                transition: all 0.05s ease-out;
            }
            
            .summarize-all-btn:disabled {
                opacity: 0.6;
                cursor: not-allowed !important;
                transform: none;
            }
            
            /* Summary Modal */
            .modal {
                display: none;
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(0, 0, 0, 0.85);
                backdrop-filter: blur(10px);
                z-index: 1000;
                animation: fadeIn 0.3s ease;
            }
            
            .modal.active {
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 2rem;
            }
            
            .modal-content {
                background: var(--bg-secondary);
                border: 1px solid var(--border);
                border-radius: 20px;
                max-width: 800px;
                width: 100%;
                max-height: 90vh;
                overflow: hidden;
                display: flex;
                flex-direction: column;
                animation: slideUp 0.3s ease;
            }
            
            @keyframes slideUp {
                from { opacity: 0; transform: translateY(50px); }
                to { opacity: 1; transform: translateY(0); }
            }
            
            .modal-header {
                padding: 2rem;
                border-bottom: 1px solid var(--border);
                display: flex;
                align-items: center;
                justify-content: space-between;
            }
            
            .modal-title {
                font-size: 1.5rem;
                font-weight: 700;
                color: var(--text-primary);
                display: flex;
                align-items: center;
                gap: 0.75rem;
            }
            
            .modal-close {
                background: var(--glass);
                border: 1px solid var(--border);
                color: var(--text-primary);
                width: 40px;
                height: 40px;
                border-radius: 10px;
                cursor: pointer;
                display: flex;
                align-items: center;
                justify-content: center;
                transition: all 0.3s;
                font-size: 1.2rem;
            }
            
            .modal-close:hover {
                background: var(--bg-tertiary);
                transform: rotate(90deg);
            }
            
            .modal-body {
                padding: 2rem;
                overflow-y: auto;
                flex: 1;
            }
            
            .modal-body::-webkit-scrollbar {
                width: 8px;
            }
            
            .modal-body::-webkit-scrollbar-track {
                background: var(--bg-tertiary);
                border-radius: 10px;
            }
            
            .modal-body::-webkit-scrollbar-thumb {
                background: var(--accent);
                border-radius: 10px;
            }
            
            .summary-content {
                color: var(--text-primary);
                line-height: 1.8;
                font-size: 0.95rem;
            }
            
            .summary-content h2 {
                color: var(--accent);
                font-size: 1.2rem;
                margin: 1.5rem 0 1rem 0;
                font-weight: 700;
            }
            
            .summary-content h2:first-child {
                margin-top: 0;
            }
            
            .summary-content p {
                margin: 0.75rem 0;
                color: var(--text-secondary);
            }
            
            .summary-content ul, .summary-content ol {
                margin: 0.75rem 0;
                padding-left: 1.5rem;
                color: var(--text-secondary);
            }
            
            .summary-content li {
                margin: 0.5rem 0;
            }
            
            .summary-loading {
                text-align: center;
                padding: 3rem;
            }
            
            .summary-loading .spinner {
                width: 50px;
                height: 50px;
                margin: 0 auto 1rem;
                border: 3px solid var(--border);
                border-top-color: #8b5cf6;
                border-radius: 50%;
                animation: spin 1s linear infinite;
            }
            
            .summary-error {
                background: rgba(239, 68, 68, 0.1);
                border: 1px solid rgba(239, 68, 68, 0.3);
                border-radius: 12px;
                padding: 1.5rem;
                color: #ef4444;
                text-align: center;
            }
            
            .summary-error i {
                font-size: 2rem;
                margin-bottom: 1rem;
                display: block;
            }
            
            .summary-meta {
                background: var(--glass);
                border: 1px solid var(--border);
                border-radius: 12px;
                padding: 1rem;
                margin-bottom: 1.5rem;
                display: flex;
                align-items: center;
                gap: 1rem;
                flex-wrap: wrap;
            }
            
            .summary-meta-item {
                display: flex;
                align-items: center;
                gap: 0.5rem;
                color: var(--text-tertiary);
                font-size: 0.85rem;
            }
            
            .summary-meta-item i {
                color: var(--accent);
            }
            
            /* Empty State */
            .empty-state {
                text-align: center;
                padding: 5rem 2rem;
                color: var(--text-tertiary);
            }
            
            .empty-state i {
                font-size: 4rem;
                margin-bottom: 1.5rem;
                opacity: 0.3;
            }
            
            .empty-state h3 {
                font-size: 1.5rem;
                color: var(--text-primary);
                margin-bottom: 0.75rem;
                font-weight: 700;
            }
            
            /* Loading */
            .loading {
                text-align: center;
                padding: 4rem 2rem;
            }
            
            .spinner {
                width: 50px;
                height: 50px;
                margin: 0 auto 1rem;
                border: 3px solid var(--border);
                border-top-color: var(--accent);
                border-radius: 50%;
                animation: spin 1s linear infinite;
            }
            
            @keyframes spin {
                to { transform: rotate(360deg); }
            }
            
            /* Animations */
            @keyframes fadeIn {
                from { opacity: 0; transform: translateY(20px); }
                to { opacity: 1; transform: translateY(0); }
            }
            
            /* ===================================
               ZONE TABS (PUBLIC VS PRIVATE)
               =================================== */
            
            .zone-tabs {
                display: flex;
                gap: 1rem;
                margin-bottom: 2rem;
                padding: 0.5rem;
                background: var(--bg-secondary);
                border: 1px solid var(--border);
                border-radius: 20px;
            }
            
            .zone-tab {
                flex: 1;
                padding: 1rem 2rem;
                background: transparent;
                border: none;
                border-radius: 15px;
                color: var(--text-tertiary);
                font-size: 1rem;
                font-weight: 600;
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 0.75rem;
                cursor: pointer;
                transition: all 0.3s ease;
                position: relative;
            }
            
            .zone-tab:hover {
                color: var(--text-primary);
                background: var(--glass);
            }
            
            .zone-tab.active {
                background: linear-gradient(135deg, var(--accent), var(--success));
                color: white;
                box-shadow: 0 10px 30px rgba(0, 217, 255, 0.3);
            }
            
            .zone-tab i {
                font-size: 1.2rem;
            }
            
            .zone-content {
                display: none;
            }
            
            .zone-content.active {
                display: block;
            }
            
            /* ===================================
               PRIVATE MODE SUB-TABS
               =================================== */
            
            .private-subtabs {
                display: flex;
                gap: 1rem;
                margin-bottom: 2rem;
                padding: 0.5rem;
                background: var(--bg-tertiary);
                border: 1px solid var(--border);
                border-radius: 15px;
            }
            
            .private-subtab {
                flex: 1;
                padding: 0.875rem 1.5rem;
                background: transparent;
                border: none;
                border-radius: 12px;
                color: var(--text-secondary);
                font-size: 0.95rem;
                font-weight: 600;
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 0.5rem;
                cursor: pointer;
                transition: all 0.3s ease;
            }
            
            .private-subtab:hover {
                color: var(--text-primary);
                background: var(--glass);
            }
            
            .private-subtab.active {
                background: linear-gradient(135deg, var(--accent), var(--success));
                color: white;
                box-shadow: 0 8px 20px rgba(0, 217, 255, 0.25);
            }
            
            .private-subtab i {
                font-size: 1.1rem;
            }
            
            .private-section {
                display: none;
                animation: fadeIn 0.3s ease;
            }
            
            .private-section.active {
                display: block;
            }
            
            /* ===================================
               ATTENDANCE STYLES
               =================================== */
            
            .attendance-login-card {
                max-width: 500px;
                margin: 4rem auto;
                background: var(--bg-secondary);
                border: 1px solid var(--border);
                border-radius: 25px;
                padding: 3rem;
                box-shadow: 0 20px 60px rgba(0, 217, 255, 0.1);
            }
            
            .login-header {
                text-align: center;
                margin-bottom: 2.5rem;
            }
            
            .login-icon {
                width: 80px;
                height: 80px;
                margin: 0 auto 1.5rem;
                background: linear-gradient(135deg, var(--accent), var(--success));
                border-radius: 20px;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 2rem;
                color: white;
                box-shadow: 0 15px 40px var(--accent-glow);
            }
            
            .login-header h2 {
                font-size: 1.75rem;
                font-weight: 700;
                color: var(--text-primary);
                margin-bottom: 0.5rem;
            }
            
            .login-header p {
                color: var(--text-tertiary);
                font-size: 0.95rem;
            }
            
            .form-group {
                margin-bottom: 1.5rem;
            }
            
            .form-group label {
                display: flex;
                align-items: center;
                gap: 0.5rem;
                margin-bottom: 0.5rem;
                color: var(--text-secondary);
                font-size: 0.9rem;
                font-weight: 600;
            }
            
            .form-group input {
                width: 100%;
                padding: 1rem;
                background: var(--bg-primary);
                border: 1px solid var(--border);
                border-radius: 12px;
                color: var(--text-primary);
                font-size: 1rem;
                transition: all 0.3s ease;
            }
            
            .form-group input:focus {
                border-color: var(--accent);
                box-shadow: 0 0 0 3px var(--accent-glow);
            }
            
            .login-submit-btn {
                width: 100%;
                padding: 1rem;
                background: linear-gradient(135deg, var(--accent), var(--success));
                border: none;
                border-radius: 12px;
                color: white;
                font-size: 1rem;
                font-weight: 700;
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 0.75rem;
                cursor: pointer;
                transition: all 0.3s ease;
                margin-bottom: 1rem;
            }
            
            .login-submit-btn:hover {
                transform: translateY(-2px);
                box-shadow: 0 15px 40px var(--accent-glow);
            }
            
            .login-submit-btn:active {
                transform: translateY(0);
            }
            
            .login-submit-btn.loading {
                pointer-events: none;
                opacity: 0.7;
            }
            
            .login-note {
                text-align: center;
                padding: 1rem;
                background: var(--glass);
                border-radius: 10px;
                color: var(--text-tertiary);
                font-size: 0.85rem;
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 0.5rem;
            }
            
            .login-note i {
                color: var(--success);
            }
            
            .remember-me {
                display: flex;
                align-items: center;
                gap: 0.5rem;
                margin-bottom: 1.5rem;
                color: var(--text-secondary);
                font-size: 0.9rem;
                cursor: pointer;
                user-select: none;
            }
            
            .remember-me input[type="checkbox"] {
                width: 18px;
                height: 18px;
                cursor: pointer;
                accent-color: var(--accent);
            }
            
            .remember-me:hover {
                color: var(--text-primary);
            }
            
            .attendance-header {
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 2rem;
                padding-bottom: 1rem;
                border-bottom: 1px solid var(--border);
            }
            
            .attendance-header h2 {
                font-size: 1.5rem;
                font-weight: 700;
                color: var(--text-primary);
                display: flex;
                align-items: center;
                gap: 0.75rem;
            }
            
            .logout-btn {
                padding: 0.75rem 1.5rem;
                background: var(--glass);
                border: 1px solid var(--border);
                border-radius: 12px;
                color: var(--text-secondary);
                font-size: 0.9rem;
                font-weight: 600;
                display: flex;
                align-items: center;

            .attendance-card-body {

            .detail-icon {

            .detail-value {

            .attendance-stats {

            .stat-item {

                color: var(--accent);

            .subject-result-card {

            @media (max-width: 1200px) {

            /* Responsive table on mobile */

                    overflow-x: auto;

                .results-table {
                    min-width: 650px;

                .results-table thead th {
                    padding: 0.75rem 0.5rem;
                    font-size: 0.8rem;

            /* Notification System - Top Smooth */
            .notification {

                font-size: 1.3rem;

            .notification-error {

            /* Responsive */

        <div class="container">
            <!-- Navigation -->
            <nav class="nav">

                    <div class="logo-icon">
                        <div class="flag-center">

                    <span>Public Lectures</span>
                </button>
                <button class="zone-tab" onclick="switchZone('private')" id="privateTab">

                    <span>Private Mode</span>
                </button>
            </div>
            
            <!-- PUBLIC ZONE: Lectures -->
            <div id="lecturesZone" class="zone-content active">
            
            <!-- Stats Grid -->
            <div class="stats">
                <div class="stat-card" style="animation: fadeIn 0.5s ease 0.2s both">
                    <div class="stat-header">
                        <div class="stat-icon">
                            <i class="fas fa-file-alt"></i>
                        </div>
                        <div class="stat-trend">
                            <i class="fas fa-arrow-up"></i> Live
                        </div>
                    </div>

                </div>

                        </div>

                            <i class="fas fa-check"></i> Synced
                        </div>
                    </div>

                </div>
